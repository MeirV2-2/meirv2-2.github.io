<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post</title>
<meta name="theme-color" content="#0a0a0a">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
<style>
    pre[class*="language-"], code[class*="language-"] {
        background: var(--code-bg) !important;
        text-shadow: none !important;
        font-family: var(--font-mono) !important;
        font-size: 13.5px !important;
    }
    .token.keyword { color: var(--red) !important; }
    .token.string  { color: var(--blue) !important; }
    .token.comment { color: var(--text-faint) !important; font-style: italic; }
    .token.number  { color: var(--green) !important; }
    .token.function { color: var(--accent) !important; }
    .token.macro   { color: var(--red) !important; }
    .token.class-name { color: #ffd580 !important; }
    article h1 {
        font-size: clamp(34px, 5vw, 44px);
        line-height: 1.1;
        letter-spacing: -0.025em;
        margin: 8px 0 12px;
        font-weight: 700;
    }
    article h2 {
        font-size: 24px;
        margin: 56px 0 16px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
        font-weight: 600;
        letter-spacing: -0.01em;
    }
    article h3 {
        font-size: 18px;
        margin: 36px 0 12px;
        font-weight: 600;
        color: var(--text);
    }
    article p { margin: 14px 0; }
    .post-meta {
        color: var(--text-faint);
        font-family: var(--font-mono);
        font-size: 13px;
        margin: 0 0 28px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border);
    }
    .loading {
        color: var(--text-faint);
        font-family: var(--font-mono);
        font-size: 14px;
        padding: 40px 0;
        text-align: center;
    }
</style>
</head>
<body>

<nav class="top">
    <div class="inner">
        <a href="./" class="brand">phantom<span class="dot">::</span>alias</a>
        <div class="links">
            <a href="blog.html">writeups</a>
            <a href="https://github.com/meirv2-2">github</a>
        </div>
    </div>
</nav>

<main class="wide">
    <article id="content">
        <div class="loading">Loading…</div>
    </article>
</main>

<footer>
    <p>
        <a href="blog.html">← all writeups</a> ·
        <a href="https://github.com/meirv2-2">GitHub</a>
    </p>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
<script>
(async function () {
    const target = document.getElementById('content');
    const slug = new URLSearchParams(window.location.search).get('p');

    if (!slug) {
        target.innerHTML = '<p style="color:var(--red);font-family:var(--font-mono)">No post specified. <a href="blog.html">Browse posts &rarr;</a></p>';
        return;
    }

    if (!/^[a-z0-9-_]+$/i.test(slug)) {
        target.innerHTML = '<p style="color:var(--red);font-family:var(--font-mono)">Invalid post id.</p>';
        return;
    }

    try {
        const [metaRes, mdRes] = await Promise.all([
            fetch('posts.json', { cache: 'no-cache' }),
            fetch('posts/' + slug + '.md', { cache: 'no-cache' }),
        ]);
        if (!mdRes.ok) throw new Error('post not found (' + mdRes.status + ')');
        const meta = metaRes.ok ? await metaRes.json() : { posts: [] };
        const post = (meta.posts || []).find(p => p.slug === slug) || { title: slug, date: '' };
        const markdown = await mdRes.text();

        document.title = post.title;

        marked.setOptions({ gfm: true, breaks: false, mangle: false, headerIds: true });
        const body = marked.parse(markdown);

        target.innerHTML =
            '<h1>' + escapeHtml(post.title) + '</h1>' +
            '<p class="post-meta">' + (post.date || '') + '</p>' +
            body;

        document.querySelectorAll('pre code').forEach(block => {
            if (block.className.includes('language-')) return;
            const text = block.textContent;
            if (/\b(NtAllocateVirtualMemory|LdrLoadDll|PVOID|HANDLE|RtlInitUnicodeString|\bauto\b|nullptr)/.test(text)) {
                block.className = 'language-cpp';
            } else if (/^[\s\S]*?\[\+\]|\[\!\]|\[\*\]/m.test(text)) {
                block.classList.add('language-bash');
            }
        });
        if (window.Prism) Prism.highlightAll();
    } catch (e) {
        target.innerHTML = '<p style="color:var(--red);font-family:var(--font-mono)">Failed to load post: ' + escapeHtml(e.message) + '</p>'
            + '<p><a href="blog.html">Back to writeups &rarr;</a></p>';
    }
})();

function escapeHtml(s) {
    return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}
</script>

</body>
</html>
